<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль — QUANTAVIUM</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f8faff;margin:0;color:#222}
    nav{background:#007bff;color:#fff;padding:15px 24px;display:flex;justify-content:space-between;align-items:center}
    nav a{color:#fff;text-decoration:none;font-weight:600}
    .wrap{max-width:900px;margin:30px auto;padding:0 16px}
    .card{background:#fff;border-radius:14px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:22px;margin-bottom:16px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .btn{border:none;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}
    .btn-primary{background:#007bff;color:#fff}
    .btn-ghost{background:#eef4ff;color:#123}
    .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#eef4ff;color:#123;font-weight:700;margin:6px 6px 0 0}
    .muted{color:#666}
    .link{color:#007bff;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <nav>
    <a href="/">На главную</a>
    <a href="/profile.html">👤 Профиль</a>
  </nav>

  <div class="wrap">
    <div class="card">
      <h2 style="margin:0 0 8px">Профиль</h2>
      <div id="meBlock" class="muted">Загрузка...</div>
      <div class="row" style="margin-top:14px">
        <button class="btn btn-primary" id="logoutBtn">Выйти</button>
        <a class="btn btn-ghost link" href="/index.html#courses" style="display:inline-flex;align-items:center">Купить ещё курс</a>
      </div>
    </div>

    <div class="card">
      <h3 style="margin:0 0 10px">Мои курсы</h3>
      <div id="coursesBlock" class="muted">Загрузка...</div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/profilePage.js"></script>
</body>
</html>
